nauto/seed/desired_services.yaml:
  - name: "ollama"
    display_name: "Ollama"
    role: "ai-inference"
    required: true
    min_instances: 1
    max_instances: 2
    min_memory_gb: 16
    prefers_gpu: true
    default_port: 11434
    protocol: "http"
    healthcheck:
      path: "/api/tags"
      expected_status: 200
    placement_policy:
      prefer_existing: true
      allow_start_new: true
      avoid_laptops: false
    notes: "Local LLM inference endpoint for agents."

  - name: "hatchet"
    display_name: "Hatchet"
    role: "automation-control"
    required: true
    min_instances: 1
    max_instances: 1
    min_memory_gb: 4
    prefers_gpu: false
    default_port: 8080
    protocol: "http"
    healthcheck:
      path: "/healthz"
      expected_status: 200
    placement_policy:
      prefer_existing: true
      allow_start_new: false
      prefer_always_on: true
    notes: "Workflow control plane for automation jobs."
